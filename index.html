<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jui | Project Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #1E192A;
            --purple: #6D6DAA;
            --bg: #FAFAF2;
            --highlight: #B282EB;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .hub-container {
            text-align: center;
            padding: 3rem;
            background: #fff;
            border-radius: 2rem;
            box-shadow: 0 20px 60px rgba(30,25,42,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 { font-weight: 900; letter-spacing: -0.04em; font-size: 2.5rem; margin-bottom: 1rem; }
        h1 span { color: var(--highlight); }
        p { color: rgba(30,25,42,0.6); margin-bottom: 2.5rem; }
        .links { display: flex; flex-direction: column; gap: 1rem; }
        .link-card {
            padding: 1.25rem;
            border-radius: 1rem;
            background: var(--bg);
            text-decoration: none;
            color: var(--dark);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .link-card:hover {
            transform: translateY(-3px);
            background: #fff;
            border-color: var(--highlight);
            box-shadow: 0 10px 30px rgba(109,109,170,0.15);
        }
        .tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.25rem 0.6rem;
            border-radius: 99px;
            background: var(--purple);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="hub-container">
        <h1>Jui <span>Project</span> Hub</h1>
        <p>Acesso rápido aos documentos do projeto e landing pages.</p>
        
        <div class="links">
            <a href="/assets/lp_jui.html" class="link-card">
                <span>Landing Page Jui (Novo)</span>
                <span class="tag">Production</span>
            </a>
            <a href="/assets/design_system.html" class="link-card">
                <span>Design System v1</span>
                <span class="tag">Styleguide</span>
            </a>
            <a href="/Guday Gummies • Manu Cit.html" class="link-card" style="opacity: 0.6;">
                <span>Original Theme Export</span>
                <span class="tag" style="background: #ccc;">Source</span>
            </a>
        </div>
    </div>
</body>
</html>
